name: CommerceLens Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CommerceLens
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run scheduled monitor
        env:
          COMMERCELENS_SMTP_HOST: ${{ secrets.COMMERCELENS_SMTP_HOST }}
          COMMERCELENS_SMTP_PORT: ${{ secrets.COMMERCELENS_SMTP_PORT }}
          COMMERCELENS_SMTP_USERNAME: ${{ secrets.COMMERCELENS_SMTP_USERNAME }}
          COMMERCELENS_SMTP_PASSWORD: ${{ secrets.COMMERCELENS_SMTP_PASSWORD }}
          COMMERCELENS_SMTP_FROM: ${{ secrets.COMMERCELENS_SMTP_FROM }}
        run: |
          commercelens run examples/monitor_config.json --out monitor_run.json

      - name: Upload monitor result
        uses: actions/upload-artifact@v4
        with:
          name: monitor-run
          path: |
            monitor_run.json
            alerts.jsonl
          if-no-files-found: ignore
